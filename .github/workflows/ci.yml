name: ci

on:
  pull_request:
    paths:
      - "cimvocabcheck/**"
      - "cimnotebook/**"
      - "cimxml/**"
      - "pom.xml"
      - "scripts/generate-sbom.sh"
      - "scripts/check-sbom-licenses.py"
      - "scripts/sbom-license-overrides.json"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  push:
    paths:
      - "cimvocabcheck/**"
      - "cimnotebook/**"
      - "cimxml/**"
      - "pom.xml"
      - "scripts/generate-sbom.sh"
      - "scripts/check-sbom-licenses.py"
      - "scripts/sbom-license-overrides.json"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Java lint -----------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimvocabcheck/core/pom.xml
            cimvocabcheck/cli/pom.xml
            cimvocabcheck/lsp/pom.xml

      # Treat any javac warning as a build error: unused imports, raw types,
      # deprecation, missing @Override, etc.
      - name: Lint — compiler warnings as errors
        run: |
          mvn -B -ntp -pl cimvocabcheck/core,cimvocabcheck/cli,cimvocabcheck/lsp -am \
            clean compile test-compile \
            -Dmaven.compiler.failOnWarning=true \
            -Dmaven.compiler.showWarnings=true \
            -Dmaven.compiler.showDeprecation=true

      # Static analysis + formatting gates (Spotless/google-java-format, Checkstyle,
      # SpotBugs, PMD/CPD). Tests and JaCoCo are skipped here for fast feedback — the
      # build-test job runs the full `verify` (including coverage gates) authoritatively.
      - name: Lint — static analysis (Spotless, Checkstyle, SpotBugs, PMD)
        run: |
          mvn -B -ntp -pl cimvocabcheck/core,cimvocabcheck/cli,cimvocabcheck/lsp -am \
            verify -DskipTests -Djacoco.skip=true

  # ---- Java build + tests --------------------------------------------------
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimvocabcheck/core/pom.xml
            cimvocabcheck/cli/pom.xml
            cimvocabcheck/lsp/pom.xml

      # -pl with all three modules + -am also builds cimxml in dependency order.
      - name: Build and test all cimvocabcheck modules
        run: |
          mvn -B -ntp -pl cimvocabcheck/core,cimvocabcheck/cli,cimvocabcheck/lsp -am clean verify

  # ---- TypeScript type-check -----------------------------------------------
  typecheck-vscode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cimnotebook/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cimnotebook/vscode

      - name: ESLint
        run: npm run lint
        working-directory: cimnotebook/vscode

      - name: Prettier format check
        run: npm run format:check
        working-directory: cimnotebook/vscode

      - name: TypeScript type-check
        run: npm run compile
        working-directory: cimnotebook/vscode

  # ---- VS Code extension build + artifact upload ---------------------------
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimvocabcheck/core/pom.xml
            cimvocabcheck/lsp/pom.xml

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cimnotebook/vscode/package-lock.json

      - name: Apply snapshot versions
        shell: bash
        run: |
          set -euo pipefail
          CIMXML_VERSION="$(bash scripts/compute-version.sh cimxml)"
          CIMVOCABCHECK_VERSION="$(bash scripts/compute-version.sh cimvocabcheck)"
          bash scripts/set-versions.sh "${CIMXML_VERSION}" "${CIMVOCABCHECK_VERSION}"

      # Build the LSP fat JAR without running tests (tests run in build-test).
      - name: Build LSP fat JAR
        run: |
          mvn -B -ntp -pl cimvocabcheck/lsp -am -DskipTests clean package

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: cimnotebook/vscode

      - name: Copy LSP JAR into extension
        run: |
          mkdir -p cimnotebook/vscode/server
          cp cimvocabcheck/lsp/target/cimvocabcheck-lsp-*.jar cimnotebook/vscode/server/cimvocabcheck-lsp.jar

      - name: Build and package VS Code extension
        run: |
          npm run bundle
          npx @vscode/vsce package --out "cimnotebook-vscode-$(node -p "require('./package.json').version").vsix"
        working-directory: cimnotebook/vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cimnotebook-vscode-${{ github.sha }}
          path: cimnotebook/vscode/cimnotebook-vscode-*.vsix
          retention-days: 30

  # ---- IntelliJ plugin build + artifact upload ----------------------------
  build-intellij-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimvocabcheck/lsp/pom.xml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: "9.5.0"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Apply snapshot versions
        shell: bash
        run: |
          set -euo pipefail
          CIMXML_VERSION="$(bash scripts/compute-version.sh cimxml)"
          CIMVOCABCHECK_VERSION="$(bash scripts/compute-version.sh cimvocabcheck)"
          bash scripts/set-versions.sh "${CIMXML_VERSION}" "${CIMVOCABCHECK_VERSION}"

      # Build the LSP fat JAR without running tests (tests run in build-test).
      - name: Build LSP fat JAR
        run: |
          mvn -B -ntp -pl cimvocabcheck/lsp -am -DskipTests clean package

      # Kotlin formatting + lint gate (Spotless + ktlint). Fails the build on any
      # unformatted/lint-violating Kotlin, mirroring the Maven Spotless gate.
      - name: Lint — Kotlin (Spotless + ktlint)
        run: gradle spotlessCheck
        working-directory: cimnotebook/intellij

      - name: Build IntelliJ plugin
        run: gradle buildPlugin
        working-directory: cimnotebook/intellij

      - name: Upload IntelliJ plugin artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cimnotebook-intellij-${{ github.sha }}
          path: cimnotebook/intellij/build/distributions/cimnotebook-intellij-*.zip
          retention-days: 30

  # ---- SBOM generation + license compliance --------------------------------
  # Covers all three distributables: the Maven library/CLI/LSP, the VS Code
  # extension's shipped npm deps, and the IntelliJ plugin's compile-time
  # IntelliJ Platform libraries. Needs all three toolchains (Java/Node/Gradle).
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimvocabcheck/core/pom.xml
            cimvocabcheck/cli/pom.xml
            cimvocabcheck/lsp/pom.xml

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cimnotebook/vscode/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: "9.5.0"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Regenerates cimvocabcheck/sbom/{maven,vscode,intellij}/{bom.json,THIRD-PARTY.txt}.
      # FAILS here if any dependency uses a license that is not on the reviewed
      # open-source allow-list (or declares no resolvable license at all).
      - name: Generate SBOMs + enforce license allow-list
        env:
          GRADLE: gradle
        run: bash scripts/generate-sbom.sh

      # FAILS if the committed SBOMs / attribution no longer match the current
      # dependency set (i.e. someone changed deps without regenerating).
      - name: Verify committed SBOMs are up to date
        run: |
          if ! git diff --exit-code -- cimvocabcheck/sbom; then
            echo "::error::cimvocabcheck/sbom is out of date. Run scripts/generate-sbom.sh and commit the result."
            exit 1
          fi

  # ---- Snapshot publish (main branch only) ---------------------------------
  publish-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - lint
      - build-test
      - typecheck-vscode
      - build-vsix
      - build-intellij-plugin
      - sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Java 21 for GitHub Packages
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimvocabcheck/core/pom.xml
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compute and apply snapshot versions
        shell: bash
        run: |
          set -euo pipefail
          CIMXML_VERSION="$(bash scripts/compute-version.sh cimxml)"
          CIMVOCABCHECK_VERSION="$(bash scripts/compute-version.sh cimvocabcheck)"
          echo "cimxml: ${CIMXML_VERSION}, cimvocabcheck: ${CIMVOCABCHECK_VERSION}"
          bash scripts/set-versions.sh "${CIMXML_VERSION}" "${CIMVOCABCHECK_VERSION}"

      # cimxml must be installed locally before cimvocabcheck-core can resolve it.
      - name: Install cimxml SNAPSHOT into local repo
        run: mvn -B -ntp -f cimxml/pom.xml -DskipTests clean install

      # Only cimvocabcheck-core is a library artifact published to package registries.
      # cimvocabcheck-cli and cimvocabcheck-lsp are fat-JAR tools and are not deployed here.
      - name: Deploy cimvocabcheck-core snapshot to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B -ntp -f cimvocabcheck/core/pom.xml clean deploy \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
