name: cimcheck-ci

on:
  pull_request:
    paths:
      - "cimcheck/**"
      - "cimxml/**"
      - "pom.xml"
      - ".github/workflows/cimcheck-ci.yml"
      - ".github/workflows/cimcheck-release.yml"
  push:
    paths:
      - "cimcheck/**"
      - "cimxml/**"
      - "pom.xml"
      - ".github/workflows/cimcheck-ci.yml"
      - ".github/workflows/cimcheck-release.yml"

permissions:
  contents: read

concurrency:
  group: cimcheck-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Java lint -----------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimcheck/core/pom.xml
            cimcheck/cli/pom.xml
            cimcheck/lsp/pom.xml

      # Treat any javac warning as a build error: unused imports, raw types,
      # deprecation, missing @Override, etc.
      - name: Lint — compiler warnings as errors
        run: |
          mvn -B -ntp -pl cimcheck/core,cimcheck/cli,cimcheck/lsp -am \
            clean compile test-compile \
            -Dmaven.compiler.failOnWarning=true \
            -Dmaven.compiler.showWarnings=true \
            -Dmaven.compiler.showDeprecation=true

  # ---- Java build + tests --------------------------------------------------
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimcheck/core/pom.xml
            cimcheck/cli/pom.xml
            cimcheck/lsp/pom.xml

      # -pl with all three modules + -am also builds cimxml in dependency order.
      - name: Build and test all cimcheck modules
        run: |
          mvn -B -ntp -pl cimcheck/core,cimcheck/cli,cimcheck/lsp -am clean verify

  # ---- TypeScript type-check -----------------------------------------------
  typecheck-vscode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: cimcheck/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cimcheck/vscode

      - name: TypeScript type-check
        run: npm run compile
        working-directory: cimcheck/vscode

  # ---- VS Code extension build + artifact upload ---------------------------
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimcheck/core/pom.xml
            cimcheck/lsp/pom.xml

      - name: Setup Node.js 18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: cimcheck/vscode/package-lock.json

      # Build the LSP fat JAR without running tests (tests run in build-test).
      - name: Build LSP fat JAR
        run: |
          mvn -B -ntp -pl cimcheck/lsp -am -DskipTests clean package

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: cimcheck/vscode

      - name: Copy LSP JAR into extension
        run: |
          mkdir -p cimcheck/vscode/server
          cp cimcheck/lsp/target/cimcheck-lsp.jar cimcheck/vscode/server/

      - name: Build and package VS Code extension
        run: |
          npm run bundle
          npx @vscode/vsce package
        working-directory: cimcheck/vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cimcheck-vscode-${{ github.sha }}
          path: cimcheck/vscode/cimcheck-*.vsix
          retention-days: 30

  # ---- Snapshot publish (main branch only) ---------------------------------
  publish-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - lint
      - build-test
      - typecheck-vscode
      - build-vsix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21 for GitHub Packages
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimcheck/core/pom.xml
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Enforce SNAPSHOT version on main
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(mvn -q -f cimcheck/core/pom.xml help:evaluate \
            -Dexpression=project.version -DforceStdout)"
          if [[ "${VERSION}" != *-SNAPSHOT ]]; then
            echo "Expected cimcheck-core version to end with -SNAPSHOT on main, found: ${VERSION}" >&2
            exit 1
          fi

      # cimxml must be installed locally before cimcheck-core can resolve it.
      - name: Install cimxml SNAPSHOT into local repo
        run: mvn -B -ntp -f cimxml/pom.xml -DskipTests clean install

      # Only cimcheck-core is a library artifact published to package registries.
      # cimcheck-cli and cimcheck-lsp are fat-JAR tools and are not deployed here.
      - name: Deploy cimcheck-core snapshot to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B -ntp -f cimcheck/core/pom.xml clean deploy \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
