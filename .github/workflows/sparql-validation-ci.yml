name: sparql-validation-ci

on:
  pull_request:
    paths:
      - "sparql-validation/**"
      - "cimxml/**"
      - "pom.xml"
      - ".github/workflows/sparql-validation-ci.yml"
      - ".github/workflows/sparql-validation-release.yml"
  push:
    paths:
      - "sparql-validation/**"
      - "cimxml/**"
      - "pom.xml"
      - ".github/workflows/sparql-validation-ci.yml"
      - ".github/workflows/sparql-validation-release.yml"

permissions:
  contents: read

concurrency:
  group: sparql-validation-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            sparql-validation/pom.xml

      # Treat any compiler warning as an error. This catches unused imports,
      # deprecation usage, raw types, missing @Override, etc. -- the cheap
      # static analysis we get for free from javac.
      - name: Lint (compiler warnings as errors)
        run: |
          mvn -B -ntp -pl sparql-validation -am clean compile test-compile \
            -Dmaven.compiler.failOnWarning=true \
            -Dmaven.compiler.showWarnings=true \
            -Dmaven.compiler.showDeprecation=true

  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            sparql-validation/pom.xml

      # -pl sparql-validation -am also builds cimxml (a SNAPSHOT dependency).
      - name: Build and test
        run: mvn -B -ntp -pl sparql-validation -am clean verify

  publish-snapshot-github-packages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - lint
      - build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21 for GitHub Packages
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            sparql-validation/pom.xml
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Enforce snapshot version on main
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(mvn -q -f sparql-validation/pom.xml help:evaluate -Dexpression=project.version -DforceStdout)"
          if [[ "${VERSION}" != *-SNAPSHOT ]]; then
            echo "Expected sparql-validation version to end with -SNAPSHOT on main, found: ${VERSION}" >&2
            exit 1
          fi

      # cimxml must be installed locally before sparql-validation can resolve it during deploy.
      - name: Install cimxml SNAPSHOT into local repo
        run: mvn -B -ntp -f cimxml/pom.xml -DskipTests clean install

      - name: Deploy sparql-validation snapshot to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B -ntp -f sparql-validation/pom.xml clean deploy \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
