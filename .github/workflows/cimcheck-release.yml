name: cimcheck-release

on:
  push:
    tags:
      - "cimcheck-v*.*.*"

permissions:
  contents: read

concurrency:
  group: cimcheck-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Validate tag --------------------------------------------------------
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.validate.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate tag and pom version
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^cimcheck-v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid tag format '${TAG}'. Expected cimcheck-vX.Y.Z" >&2
            exit 1
          fi

          RELEASE_VERSION="${TAG#cimcheck-v}"
          POM_VERSION="$(mvn -q -f cimcheck/core/pom.xml help:evaluate \
            -Dexpression=project.version -DforceStdout)"

          if [[ "${POM_VERSION}" != *-SNAPSHOT ]]; then
            echo "pom version '${POM_VERSION}' is not a SNAPSHOT; was the tag pushed before the version bump?" >&2
            exit 1
          fi

          POM_BASE="${POM_VERSION%-SNAPSHOT}"
          if [[ "${POM_BASE}" != "${RELEASE_VERSION}" ]]; then
            echo "Tag version '${RELEASE_VERSION}' does not match pom base version '${POM_BASE}' (pom=${POM_VERSION})" >&2
            exit 1
          fi

          echo "release_version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"

  # ---- Maven Central (cimcheck-core only) ----------------------------------
  publish-maven-central:
    needs: validate-tag
    runs-on: ubuntu-latest
    environment: Maven Central Deployment
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      RELEASE_VERSION: ${{ needs.validate-tag.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${CENTRAL_PORTAL_USERNAME}" ]] || (echo "CENTRAL_PORTAL_USERNAME is missing" >&2; exit 1)
          [[ -n "${CENTRAL_PORTAL_PASSWORD}" ]] || (echo "CENTRAL_PORTAL_PASSWORD is missing" >&2; exit 1)
          [[ -n "${MAVEN_GPG_PASSPHRASE}"    ]] || (echo "MAVEN_GPG_PASSPHRASE is missing"    >&2; exit 1)

      - name: Setup Java 21 + Maven Central auth + GPG
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimcheck/core/pom.xml
          server-id: central
          server-username: CENTRAL_PORTAL_USERNAME
          server-password: CENTRAL_PORTAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set release versions
        shell: bash
        run: |
          set -euo pipefail

          # Set cimcheck-core artifact version to the release version.
          mvn -B -ntp -f cimcheck/core/pom.xml \
            org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
            -DnewVersion="${RELEASE_VERSION}" \
            -DgenerateBackupPoms=false

          # Resolve the cimxml dependency from SNAPSHOT to its release version so the
          # published POM does not contain a SNAPSHOT reference (Maven Central rejects those).
          # TODO: remove this block once cimxml is hardcoded as a release version in pom.xml.
          CIMXML_SNAP="$(mvn -q -f cimcheck/core/pom.xml help:evaluate \
            -Dexpression=ver.cimxml -DforceStdout)"
          CIMXML_RELEASE="${CIMXML_SNAP%-SNAPSHOT}"
          mvn -B -ntp -f cimcheck/core/pom.xml \
            org.codehaus.mojo:versions-maven-plugin:2.21.0:set-property \
            -Dproperty=ver.cimxml \
            -DnewVersion="${CIMXML_RELEASE}" \
            -DgenerateBackupPoms=false
          # Bump cimxml itself so the local install satisfies the rewritten dependency.
          mvn -B -ntp -f cimxml/pom.xml \
            org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
            -DnewVersion="${CIMXML_RELEASE}" \
            -DgenerateBackupPoms=false

      - name: Install cimxml release into local repo
        run: mvn -B -ntp -f cimxml/pom.xml -DskipTests clean install

      - name: Publish cimcheck-core to Maven Central
        run: mvn -B -ntp -f cimcheck/core/pom.xml -Pcentral-release clean deploy

  # ---- GitHub Packages (cimcheck-core release) -----------------------------
  publish-github-packages-release:
    needs:
      - validate-tag
      - publish-maven-central
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_VERSION: ${{ needs.validate-tag.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21 for GitHub Packages
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimcheck/core/pom.xml
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set release versions
        shell: bash
        run: |
          set -euo pipefail

          mvn -B -ntp -f cimcheck/core/pom.xml \
            org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
            -DnewVersion="${RELEASE_VERSION}" \
            -DgenerateBackupPoms=false

          # TODO: remove once cimxml is hardcoded as a release version in pom.xml.
          CIMXML_SNAP="$(mvn -q -f cimcheck/core/pom.xml help:evaluate \
            -Dexpression=ver.cimxml -DforceStdout)"
          CIMXML_RELEASE="${CIMXML_SNAP%-SNAPSHOT}"
          mvn -B -ntp -f cimcheck/core/pom.xml \
            org.codehaus.mojo:versions-maven-plugin:2.21.0:set-property \
            -Dproperty=ver.cimxml \
            -DnewVersion="${CIMXML_RELEASE}" \
            -DgenerateBackupPoms=false
          mvn -B -ntp -f cimxml/pom.xml \
            org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
            -DnewVersion="${CIMXML_RELEASE}" \
            -DgenerateBackupPoms=false

      - name: Install cimxml release into local repo
        run: mvn -B -ntp -f cimxml/pom.xml -DskipTests clean install

      - name: Publish cimcheck-core release to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B -ntp -f cimcheck/core/pom.xml -DskipTests clean deploy \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}

  # ---- GitHub Release with binary artifacts --------------------------------
  publish-release-assets:
    needs:
      - validate-tag
      - publish-maven-central
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.validate-tag.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimcheck/core/pom.xml
            cimcheck/cli/pom.xml
            cimcheck/lsp/pom.xml

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cimcheck/vscode/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: "9.5.0"

      - name: Set release versions for all modules
        shell: bash
        run: |
          set -euo pipefail

          # TODO: remove cimxml version-mangling once it is hardcoded as a release in pom.xml.
          CIMXML_SNAP="$(mvn -q -f cimcheck/core/pom.xml help:evaluate \
            -Dexpression=ver.cimxml -DforceStdout)"
          CIMXML_RELEASE="${CIMXML_SNAP%-SNAPSHOT}"

          # Bump cimxml pom to the release version.
          mvn -B -ntp -f cimxml/pom.xml \
            org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
            -DnewVersion="${CIMXML_RELEASE}" \
            -DgenerateBackupPoms=false

          # Bump all cimcheck module poms (core, cli, lsp, reactor).
          for f in cimcheck/core/pom.xml cimcheck/cli/pom.xml cimcheck/lsp/pom.xml cimcheck/pom.xml; do
            mvn -B -ntp -f "$f" \
              org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
              -DnewVersion="${RELEASE_VERSION}" \
              -DgenerateBackupPoms=false
          done

          # Bump the IntelliJ plugin version to match.
          sed -i "s/^pluginVersion=.*/pluginVersion=${RELEASE_VERSION}/" \
            cimcheck/intellij/gradle.properties

          # Update cross-module version references inside each pom.
          mvn -B -ntp -f cimcheck/core/pom.xml \
            org.codehaus.mojo:versions-maven-plugin:2.21.0:set-property \
            -Dproperty=ver.cimxml -DnewVersion="${CIMXML_RELEASE}" \
            -DgenerateBackupPoms=false
          for f in cimcheck/cli/pom.xml cimcheck/lsp/pom.xml; do
            mvn -B -ntp -f "$f" \
              org.codehaus.mojo:versions-maven-plugin:2.21.0:set-property \
              -Dproperty=ver.cimcheck-core -DnewVersion="${RELEASE_VERSION}" \
              -DgenerateBackupPoms=false
          done

      - name: Install cimxml and cimcheck-core into local repo
        run: |
          mvn -B -ntp -f cimxml/pom.xml -DskipTests clean install
          mvn -B -ntp -f cimcheck/core/pom.xml -DskipTests clean install

      - name: Build CLI fat JAR
        run: mvn -B -ntp -f cimcheck/cli/pom.xml -DskipTests clean package

      - name: Build LSP fat JAR
        run: mvn -B -ntp -f cimcheck/lsp/pom.xml -DskipTests clean package

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: cimcheck/vscode

      - name: Copy LSP JAR into VS Code extension
        run: |
          mkdir -p cimcheck/vscode/server
          cp cimcheck/lsp/target/cimcheck-lsp.jar cimcheck/vscode/server/

      - name: Build and package VS Code extension
        run: |
          npm run bundle
          npx @vscode/vsce package
        working-directory: cimcheck/vscode

      - name: Build IntelliJ plugin
        run: gradle buildPlugin
        working-directory: cimcheck/intellij

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "CIMcheck ${{ env.RELEASE_VERSION }}" \
            --generate-notes \
            cimcheck/cli/target/cimcheck.jar \
            cimcheck/lsp/target/cimcheck-lsp.jar \
            cimcheck/vscode/cimcheck-*.vsix \
            cimcheck/intellij/build/distributions/cimcheck-intellij-*.zip
