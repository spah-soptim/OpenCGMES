name: cimnotebook-release

# Releasing the CIMNotebook editor plugins (VS Code + IntelliJ). Unlike the CI build —
# which bundles the in-repo (snapshot) CIMVocabCheck LSP — a release bundles the LSP at the
# **latest released cimvocabcheck version** (resolved from the newest cimvocabcheck-v* tag),
# mirroring how releases pin their cimxml dependency to a release rather than a SNAPSHOT.
on:
  push:
    tags:
      - "cimnotebook-v*.*.*"

permissions:
  contents: read

concurrency:
  group: cimnotebook-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Validate tag and resolve dependency versions ------------------------
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.validate.outputs.release_version }}
      cimvocabcheck_version: ${{ steps.validate.outputs.cimvocabcheck_version }}
      cimxml_version: ${{ steps.validate.outputs.cimxml_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate tag and resolve cimvocabcheck / cimxml versions
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^cimnotebook-v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid tag format '${TAG}'. Expected cimnotebook-vX.Y.Z" >&2
            exit 1
          fi
          RELEASE_VERSION="${TAG#cimnotebook-v}"

          # Bundle the LSP at the LATEST released cimvocabcheck version. Falls back to the
          # in-repo SNAPSHOT until the first cimvocabcheck-vX.Y.Z tag exists.
          CIMVOCABCHECK_TAG="$(git tag --sort=-version:refname --list 'cimvocabcheck-v*' | head -1)"
          if [[ -n "${CIMVOCABCHECK_TAG}" ]]; then
            CIMVOCABCHECK_VERSION="${CIMVOCABCHECK_TAG#cimvocabcheck-v}"
          else
            echo "::warning::No cimvocabcheck release tag found; bundling the in-repo 0.0.0-SNAPSHOT LSP." >&2
            CIMVOCABCHECK_VERSION="0.0.0-SNAPSHOT"
          fi

          # cimxml is a transitive dependency of the LSP (lsp -> core -> cimxml).
          CIMXML_TAG="$(git tag --sort=-version:refname --list 'cimxml-v*' | head -1)"
          if [[ -z "${CIMXML_TAG}" ]]; then
            echo "::warning::No cimxml release tag found; using 0.0.0-SNAPSHOT." >&2
            # exit 1 # TODO: Remove version bypass
          fi
          # CIMXML_VERSION="${CIMXML_TAG#cimxml-v}"
          CIMXML_VERSION="0.0.0-SNAPSHOT" # TODO: Remove version bypass

          echo "release_version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "cimvocabcheck_version=${CIMVOCABCHECK_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "cimxml_version=${CIMXML_VERSION}" >> "${GITHUB_OUTPUT}"

  # ---- GitHub Release with binary artifacts (VSIX + IntelliJ zip) ----------
  publish-release-assets:
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.validate-tag.outputs.release_version }}
      CIMVOCABCHECK_VERSION: ${{ needs.validate-tag.outputs.cimvocabcheck_version }}
      CIMXML_VERSION: ${{ needs.validate-tag.outputs.cimxml_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimvocabcheck/core/pom.xml
            cimvocabcheck/lsp/pom.xml

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cimnotebook/vscode/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: "9.5.0"

      # Plugins -> RELEASE_VERSION; bundled LSP -> latest released cimvocabcheck version.
      - name: Apply release versions
        run: bash scripts/set-versions.sh "${CIMXML_VERSION}" "${CIMVOCABCHECK_VERSION}" "${RELEASE_VERSION}"

      - name: Install cimxml and cimvocabcheck-core into local repo
        run: |
          mvn -B -ntp -f cimxml/pom.xml -DskipTests clean install
          mvn -B -ntp -f cimvocabcheck/core/pom.xml -DskipTests clean install

      - name: Build LSP fat JAR
        run: mvn -B -ntp -f cimvocabcheck/lsp/pom.xml -DskipTests clean package

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: cimnotebook/vscode

      - name: Copy LSP JAR into VS Code extension
        run: |
          mkdir -p cimnotebook/vscode/server
          cp cimvocabcheck/lsp/target/cimvocabcheck-lsp-*.jar cimnotebook/vscode/server/cimvocabcheck-lsp.jar

      - name: Build and package VS Code extension
        run: |
          npm run bundle
          npx @vscode/vsce package --out "cimnotebook-vscode-${{ env.RELEASE_VERSION }}.vsix"
        working-directory: cimnotebook/vscode

      - name: Build IntelliJ plugin
        run: gradle buildPlugin
        working-directory: cimnotebook/intellij

      - name: Create draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "CIMNotebook ${{ env.RELEASE_VERSION }}" \
            --generate-notes \
            --draft \
            "cimnotebook/vscode/cimnotebook-vscode-${{ env.RELEASE_VERSION }}.vsix" \
            cimnotebook/intellij/build/distributions/cimnotebook-intellij-*.zip

  # ---- JetBrains Marketplace -----------------------------------------------
  publish-jetbrains-marketplace:
    needs: validate-tag
    runs-on: ubuntu-latest
    environment: JetBrains Marketplace Deployment
    env:
      PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
      RELEASE_VERSION: ${{ needs.validate-tag.outputs.release_version }}
      CIMVOCABCHECK_VERSION: ${{ needs.validate-tag.outputs.cimvocabcheck_version }}
      CIMXML_VERSION: ${{ needs.validate-tag.outputs.cimxml_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            cimxml/pom.xml
            cimvocabcheck/core/pom.xml
            cimvocabcheck/lsp/pom.xml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: "9.5.0"

      - name: Validate required secret
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${PUBLISH_TOKEN}" ]] || (echo "JETBRAINS_MARKETPLACE_TOKEN secret is missing" >&2; exit 1)

      - name: Apply release versions
        run: bash scripts/set-versions.sh "${CIMXML_VERSION}" "${CIMVOCABCHECK_VERSION}" "${RELEASE_VERSION}"

      - name: Install cimxml and cimvocabcheck-core into local repo
        run: |
          mvn -B -ntp -f cimxml/pom.xml -DskipTests clean install
          mvn -B -ntp -f cimvocabcheck/core/pom.xml -DskipTests clean install

      - name: Build LSP fat JAR
        run: mvn -B -ntp -f cimvocabcheck/lsp/pom.xml -DskipTests clean package

      - name: Publish plugin to JetBrains Marketplace
        run: gradle publishPlugin
        working-directory: cimnotebook/intellij
